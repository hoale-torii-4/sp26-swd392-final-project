services:
  # 1. BACKEND API (.NET)
  - type: web
    name: shophangtet-api
    env: dotnet
    rootDir: back-end/ShopHangTet
    buildCommand: dotnet publish -c Release -o ./publish
    startCommand: dotnet ./publish/ShopHangTet.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: DOTNET_EnableDiagnostics
        value: false
      
      # Database & Auth
      - key: ConnectionStrings__MongoConnection
        sync: false
      - key: Jwt__SecretKey
        sync: false
      
      # Email Services
      - key: Brevo__ApiKey
        sync: false
      - key: Brevo__SenderEmail
        sync: false
      - key: Brevo__SenderName
        sync: false

      # SePay Configuration
      - key: SePay__WebhookToken
        sync: false
      - key: SePay__BankAccountNumber
        sync: false
      - key: SePay__BankName
        sync: false

      # Code expects these envs at startup; add fallbacks used by code
      - key: MONGODB_CONNECTION_STRING
        sync: false

      - key: GROQ_API_KEY
        sync: false

      # NodeJS/legacy fallback names (uppercase single-underscore)
      - key: SEPAY_WEBHOOK_TOKEN
        sync: false
      - key: SEPAY_BANK_ACCOUNT_NUMBER
        sync: false

      - key: OpenRouter__ApiKey
        sync: false

  # 2. FRONTEND WEB (Vue.js)
  - type: static
    name: shophangtet-web
    env: node
    nodeVersion: 20
    rootDir: front-end
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false