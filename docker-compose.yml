services:
  # Database
  db:
    image: mongo:7.0
    container_name: shop_hang_tet_db
    command: ["mongod","--replSet","rs0","--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'db:27017'}]}) }" | mongosh --quiet
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 40s

  # Backend API (.NET)
  backend:
    build: ./back-end/ShopHangTet
    container_name: shop_hang_tet_backend
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__MongoConnection=mongodb://db:27017/?replicaSet=rs0
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # Backend API (Node.js)
  backend-nodejs:
    build: ./back-end-nodejs
    container_name: shop_hang_tet_backend_nodejs
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://db:27017
      - DB_NAME=ShopHangTetDb
      - PORT=5001
      - NODE_ENV=development
      - JWT_SECRET_KEY=ShopHangTet_DefaultSecretKey_2024_MongoDB_VerySecureKey123456789
      - JWT_ISSUER=ShopHangTet
      - JWT_AUDIENCE=ShopHangTet.Client
      - JWT_EXPIRES_IN=7d
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USERNAME=shophangtet.dev@gmail.com
      - SMTP_PASSWORD=hangtet88.com
      - SMTP_FROM=Shop Hàng Tết <shophangtet.dev@gmail.com>
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5001/api/system/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongo_data: