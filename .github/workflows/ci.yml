name: ShopHangTet CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  # ==========================================
  # BACK-END (.NET)
  # ==========================================
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "9.0.x"

      # Cache NuGet packages
      - name: Cache NuGet
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget

      - name: Restore backend
        run: dotnet restore back-end/ShopHangTet/ShopHangTet.csproj

      - name: Build backend
        run: dotnet build back-end/ShopHangTet/ShopHangTet.csproj --no-restore --configuration Release


  # ==========================================
  # FRONT-END (React / Vite)
  # ==========================================
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        working-directory: ./front-end
        run: npm install

      - name: Build frontend
        working-directory: ./front-end
        run: npm run build


  # ==========================================
  # BACK-END NODEJS (AI / Chat service)
  # ==========================================
  build-backend-nodejs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: ./back-end-nodejs
        run: npm install

      - name: Check syntax
        working-directory: ./back-end-nodejs
        run: node --check src/server.js


  # ==========================================
  # SYNC FORK (deploy step)
  # ==========================================
  sync-fork:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-backend-nodejs]
    if: github.repository == 'hoale-torii-4/sp26-swd392-final-project' && github.event_name == 'push'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to fork
        env:
          FORK_PAT: ${{ secrets.FORK_PAT }}
        run: |
          git remote add fork https://x-access-token:${FORK_PAT}@github.com/Yiunny/sp26-swd392-final-project.git
          LOCAL_HEAD=$(git rev-parse HEAD)
          FORK_HEAD=$(git ls-remote fork refs/heads/main | awk '{print $1}')

          if [ "$LOCAL_HEAD" = "$FORK_HEAD" ]; then
            echo "Fork already up to date."
          else
            echo "Pushing commit $LOCAL_HEAD to fork..."
            git push fork main --force
          fi
